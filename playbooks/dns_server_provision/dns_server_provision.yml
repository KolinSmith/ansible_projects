---
  #sudo ansible-playbook ~/code_base/ansible_projects/playbooks/dns_server_provision/dns_server_provision.yml
  - name: initial setup (defiant & ds9)
    hosts: provision_servers
    gather_facts: true
    become: true
    tags: [initial_provision]
    vars_files:
      - vars/dns_server_provision_vars.yml
    roles:
      - role: bootstrap_python
      # - role: deploy_apt-cacher_client
      - role: check_if_pi
      - role: provision_server

  - name: OS setup (defiant & ds9)
    hosts: post_provision_servers
    gather_facts: true
    become: true
    tags: [post_provision]
    vars_files:
      - vars/dns_server_provision_vars.yml
    vars:
      motd_force_install: true
    roles:
      - role: check_if_pi
      - role: remove_default_user
      - role: install_custom_motd
      # - role: artis3n.tailscale  #not working currently
      # - role: IronicBadger.figurine

  - name: Deploy Pi-hole via Docker Compose (defiant & ds9)
    hosts: post_provision_servers
    gather_facts: true
    become: true
    tags: [post_provision]
    vars_files:
      - ../../group_vars/all/vars.yml
      - ../../group_vars/all/docker_vars.yml
    vars:
      docker_users:
        - "{{ username }}"
      docker_install_compose: false
      deploy_docker_services_for: "{{ inventory_hostname }}"
      pihole_container_name: "pihole-{{ inventory_hostname | lower }}"

    roles:
      - role: geerlingguy.docker_arm
      - role: deploy_docker_env

    tasks:
      - name: Stop traditional pihole-FTL before starting container (frees :53 and :80)
        systemd:
          name: pihole-FTL
          state: stopped
          enabled: false
        failed_when: false

      - name: Disable systemd-resolved DNS stub listener (frees :53 for Pi-hole)
        lineinfile:
          path: /etc/systemd/resolved.conf
          regexp: '^#?DNSStubListener'
          line: 'DNSStubListener=no'
          insertafter: '^\[Resolve\]'

      - name: Restart systemd-resolved to free port 53
        systemd:
          name: systemd-resolved
          state: restarted

      - name: Start Pi-hole container
        community.docker.docker_compose_v2:
          project_src: "/home/{{ ansible_user }}/docker"
          state: present

      - name: Configure Pi-hole whitelist and blacklist
        include_role:
          name: deploy_pihole
          tasks_from: configure_pihole_docker.yml
