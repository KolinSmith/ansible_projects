---
# Install Obsidian headlessly on Ubuntu using Xvfb as a virtual display.
# Two systemd services are created: xvfb.service and obsidian.service.
# Obsidian Sync credentials are restored from files/obsidian-config.tar.gz
# (vault-encrypted) — no manual login required on re-provision.

- name: Install Xvfb and Electron runtime dependencies
  apt:
    name:
      - xvfb
      - libgbm1
      - libasound2t64
    state: present
    update_cache: true
  become: true

- name: Check installed Obsidian version
  command: dpkg-query --showformat='${Version}' --show obsidian
  register: obsidian_installed_version
  failed_when: false
  changed_when: false

- name: Download Obsidian {{ obsidian_version }} .deb
  get_url:
    url: "https://github.com/obsidianmd/obsidian-releases/releases/download/v{{ obsidian_version }}/obsidian_{{ obsidian_version }}_amd64.deb"
    dest: "/tmp/obsidian_{{ obsidian_version }}_amd64.deb"
    mode: '0644'
  when: obsidian_installed_version.rc != 0 or obsidian_installed_version.stdout != obsidian_version

- name: Install Obsidian .deb (resolves Electron dependencies via apt)
  apt:
    deb: "/tmp/obsidian_{{ obsidian_version }}_amd64.deb"
    state: present
  become: true
  when: obsidian_installed_version.rc != 0 or obsidian_installed_version.stdout != obsidian_version

- name: Deploy xvfb.service unit
  template:
    src: xvfb.service.j2
    dest: /etc/systemd/system/xvfb.service
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: Reload systemd daemon

- name: Deploy obsidian.service unit
  template:
    src: obsidian.service.j2
    dest: /etc/systemd/system/obsidian.service
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: Reload systemd daemon

- name: Flush handlers (daemon-reload before enabling services)
  meta: flush_handlers

- name: Check for existing Obsidian auth data (IndexedDB)
  stat:
    path: "/home/{{ obsidian_user }}/.config/obsidian/IndexedDB"
  register: obsidian_indexeddb
  become: true

- name: Restore Obsidian config from vault backup
  when: not obsidian_indexeddb.stat.exists
  block:
    - name: Ensure obsidian config directory exists
      file:
        path: "/home/{{ obsidian_user }}/.config/obsidian"
        state: directory
        owner: "{{ obsidian_user }}"
        group: "{{ obsidian_user }}"
        mode: '0755'
      become: true

    - name: Copy vault-encrypted config tarball to target
      copy:
        src: obsidian-config.tar.gz
        dest: "/tmp/obsidian-config.tar.gz"
        owner: "{{ obsidian_user }}"
        mode: '0600'
      become: true

    - name: Extract obsidian config
      unarchive:
        src: "/tmp/obsidian-config.tar.gz"
        dest: "/home/{{ obsidian_user }}/.config/obsidian/"
        owner: "{{ obsidian_user }}"
        group: "{{ obsidian_user }}"
        remote_src: true
      become: true

    - name: Remove config tarball from target
      file:
        path: /tmp/obsidian-config.tar.gz
        state: absent
      become: true

- name: Enable and start xvfb.service
  systemd:
    name: xvfb
    enabled: true
    state: started
  become: true

- name: Enable and start obsidian.service
  systemd:
    name: obsidian
    enabled: true
    state: started
  become: true

- name: Display post-install instructions
  debug:
    msg:
      - "=== Obsidian installed and services started ==="
      - ""
      - "Obsidian config restored from vault backup — Sync should connect automatically."
      - "Verify: sudo systemctl status obsidian && journalctl -u obsidian -n 20 --no-pager"
      - ""
      - "If Sync does not connect (e.g. auth token expired), do the one-time login:"
      - "  1. sudo systemctl stop obsidian"
      - "  2. From MacBook: ssh -X {{ obsidian_user }}@voyager"
      - "  3. /opt/Obsidian/obsidian --no-sandbox"
      - "  4. Log in and reconnect Sync, then: sudo systemctl start obsidian"
      - "  5. Re-run: make -C roles/install_obsidian backup  (or see README)"
      - ""
      - "See roles/install_obsidian/README.md for full details."
